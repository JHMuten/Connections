<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Connections</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="lang-fr">
    <!-- Settings modal -->
    <div id="modal-settings" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title" id="modal-title-text">Puzzle Settings</div>
                <button class="modal-close" id="btn-close-settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <p class="settings-hint" id="settings-hint-text">Select categories (minimum 4 required). The puzzle randomly picks 4 of your chosen categories each time.</p>
                <div id="settings-grouped-list"></div>
            </div>
            <div class="modal-footer">
                <div class="modal-meta-btns">
                    <button class="meta-btn" id="btn-select-all">Select all</button>
                    <span style="color:#e5e7eb">|</span>
                    <button class="meta-btn" id="btn-deselect-all">Deselect all</button>
                </div>
                <div id="settings-error" style="display:none; font-size:0.8rem; font-weight:700; color:#dc2626; background:#fee2e2; border:1.5px solid #fca5a5; border-radius:8px; padding:7px 12px; max-width:220px; text-align:center; line-height:1.3;">
                    Please select at least 4 categories before applying.
                </div>
                <button class="btn-apply" id="btn-save-settings">Apply & New Puzzle</button>
            </div>
        </div>
    </div>

    <!-- Main app -->
    <div class="top-bar">
        <div class="lang-bar">
            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="fr"><span class="flag">🇫🇷</span> French</button>
                <button class="lang-btn" data-lang="es"><span class="flag">🇪🇸</span> Spanish</button>
                <button class="lang-btn" data-lang="de"><span class="flag">🇩🇪</span> German</button>
            </div>
            <button id="btn-settings" title="Settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>
    </div>

    <header class="app-header">
        <h1 class="game-title" id="game-title">French Connections</h1>
        <p class="game-subtitle" id="game-subtitle">Create 4 groups of 4 related words.</p>
    </header>

    <div class="main-content">
        <div id="solved-area"></div>
        <div id="game-grid"></div>
        <div id="message-box"></div>
        <div class="btn-row">
            <button class="btn btn-submit" id="btn-submit" disabled>Submit</button>
            <button class="btn btn-hint" id="btn-hint">💡 Hint</button>
            <button class="btn btn-answers" id="btn-answers">Show Answers</button>
            <button class="btn btn-new" id="btn-new">New Puzzle</button>
        </div>
    </div>

    <footer>Created by Bethlingual</footer>

    <script src="js/data/french.js"></script>
    <script src="js/data/spanish.js"></script>
    <script src="js/data/german.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
